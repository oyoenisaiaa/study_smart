<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartStudy - AI Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <!-- Page Header -->
  <header class="bg-blue-600 text-white p-6 text-center">
    <h1 class="text-3xl font-bold">AI Study Planner</h1>
    <p class="mt-2">Create your personalized 7-day study plan</p>
  </header>

  <!-- Planner Form -->
  <main class="max-w-lg mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
    <h2 class="text-xl font-semibold mb-4">Your AI-powered study companion</h2>

    <form id="studyForm" class="space-y-4">

      <!-- Subject -->
      <div>
        <label class="block mb-1 font-medium">Subject*</label>
        <select id="subject" class="w-full p-2 border border-gray-300 rounded bg-blue-50">
          <option value="">Select a subject</option>
          <option value="math">Math</option>
          <option value="english">English</option>
          <option value="science">Science</option>
        </select>
      </div>

      <!-- Study Hours -->
      <div>
        <label class="block mb-1 font-medium">Study hours per day*</label>
        <input type="number" id="hours" placeholder="e.g 2" class="w-full p-2 border border-gray-300 rounded bg-blue-50" />
      </div>

      <!-- Exam Date (optional) -->
      <div>
        <label class="block mb-1 font-medium">Exam Date (optional)</label>
        <input type="date" id="examDate" class="w-full p-2 border border-gray-300 rounded bg-blue-50" />
      </div>

      <!-- Error Message -->
      <p id="error" class="text-red-500 text-sm hidden"></p>

      <!-- Submit Button -->
      <button type="submit" class="w-full py-2 bg-blue-600 text-white font-semibold rounded hover:bg-blue-700">
        Generate Study Plan
      </button>

      <!-- Loading -->
      <div id="loading" class="text-center text-blue-600 font-medium hidden">
        Generating...
      </div>

    </form>

    <!-- Output -->
    <div id="output" class="mt-6 space-y-3"></div>
  </main>

  <!-- Footer -->
  <footer class="mt-12 p-6 text-center text-gray-500 text-sm">
    © 2026 SmartStudy. All rights reserved.
  </footer>

  <!-- JS -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const studyForm = document.getElementById("studyForm");

      studyForm.addEventListener("submit", function(e) {
        e.preventDefault();

        const subject = document.getElementById("subject").value;
        const hours = document.getElementById("hours").value;
        const examDate = document.getElementById("examDate").value;

        const output = document.getElementById("output");
        const loading = document.getElementById("loading");
        const error = document.getElementById("error");

        // Reset states
        error.classList.add("hidden");
        output.innerHTML = "";

        // Validation
        if (!subject || !hours) {
          error.textContent = "Please fill in all required fields.";
          error.classList.remove("hidden");
          return;
        }

        // Show loading
        loading.classList.remove("hidden");

        setTimeout(() => {
          loading.classList.add("hidden");

          const topics = {
            math: ["Algebra", "Geometry", "Trigonometry", "Statistics", "Revision"],
            english: ["Grammar", "Essay Writing", "Comprehension", "Vocabulary", "Revision"],
            science: ["Biology", "Chemistry", "Physics", "Experiments", "Revision"]
          };

          let planHTML = `<h3 class="text-lg font-semibold mb-2">Your 7-Day Study Plan</h3>`;

          for (let i = 0; i < 7; i++) {
            const topic = topics[subject][i % topics[subject].length];

            planHTML += `
              <div class="flex items-center gap-2 p-3 bg-blue-50 rounded shadow-sm">
                <input type="checkbox" class="accent-blue-600">
                <span><strong>Day ${i + 1}:</strong> ${topic} (${hours} hrs)</span>
              </div>
            `;
          }

          if (examDate) {
            planHTML += `<p class="mt-3 text-sm text-gray-600"><strong>Exam Date:</strong> ${examDate}</p>`;
          }

          output.innerHTML = planHTML;
        }, 1200);
      });
    });
  </script>

</body>
</html>
